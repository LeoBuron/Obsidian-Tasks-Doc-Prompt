# Release automation: conventional commits -> release PR -> auto-publish.
#
# OPERATIONAL RULES (do not violate or releases will silently fail):
#   1. Always merge the release PR via the GitHub UI's green Merge button.
#      Never via `gh pr merge` from CLI, never via automerge. Both route
#      through GITHUB_TOKEN, which does NOT cascade-trigger this workflow,
#      so the release job would never fire on PR merge.
#   2. Expect first-run silence. Until a feat:/fix:/perf: commit lands on
#      main after this workflow is enabled, no release PR will be opened.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Append new version to versions.json
        env:
          NEW_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          MIN_APP=$(jq -r '.minAppVersion' manifest.json)
          jq --arg v "$NEW_VERSION" --arg m "$MIN_APP" '. + {($v): $m}' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json

      - name: Commit and push versions.json sync
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if git diff --quiet versions.json; then
            echo "versions.json unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add versions.json
          git commit -m "chore: sync versions.json for $TAG [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt failed; retrying"
            sleep 2
          done
          echo "ERROR: failed to push versions.json sync after 3 attempts"
          exit 1

      - name: Install, test, build
        run: |
          npm ci
          npm test
          npm run build

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" main.js manifest.json versions.json

      - name: Publish (un-draft)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false
